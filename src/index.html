<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sip</title>
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Dolgozók</h1>

    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" 
    data-bs-toggle="modal" 
    data-bs-target="#operatorModal">
      Hozzáadás
    </button>



    <table class="table table-striped">
      <thead>
        <tr>
          <th>Id</th>
          <th>Név</th>
          <th>Település</th>
          <th>Fizetés</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>


  </div>




  <!-- Modal -->
  <div class="modal fade" id="operatorModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Hozzáadás</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          

          <form id="empForm">
            <div>
              <label for="id" class="form-label">Id</label>
              <input type="text" class="form-control"
              id="id" readonly>
            </div>
            <div>
              <label for="name" class="form-label">Név</label>
              <input type="text" class="form-control"
              id="name">
            </div>
            <div>
              <label for="city" class="form-label">Település</label>
              <input type="text" class="form-control"
              id="city">
            </div>
            <div>
              <label for="salary" class="form-label">Fizetés</label>
              <input type="text" class="form-control"
              id="salary">
            </div>
          </form>          




        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" 
          data-bs-dismiss="modal">
            Bezárás
          </button>
          <button type="submit" class="btn btn-primary"
          form="empForm" data-bs-dismiss="modal">
            Mentés
          </button>
        </div>
      </div>
    </div>
  </div>


  <script src="bootstrap.js"></script>
  <script src="app.js"></script>
</body>

</html>
